services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3368:3368"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MAIN_URL=${NEXT_PUBLIC_MAIN_URL:-http://localhost:3368}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3368"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3368:3368"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_MAIN_URL=${NEXT_PUBLIC_MAIN_URL:-http://localhost:3368}
    command: npx next dev -H 0.0.0.0 -p 3368
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    profiles:
      - dev