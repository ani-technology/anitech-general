name: CI/CD Development

on:
  push:
    branches: [development]
  pull_request:
    types: [closed]
    branches: [development]

env:
  IMAGE_NAME: ghcr.io/aniteknologi/anitech-general

jobs:
  build-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:development-latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:development-cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:development-cache,mode=max

      - name: Deploy to Development Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST_DEV }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/anitech-general
            git fetch origin development
            git reset --hard origin/development
            docker pull ghcr.io/aniteknologi/anitech-general:development-latest
            docker compose down
            docker compose up -d
            docker image prune -f
            echo "✅ Development deployed successfully!"